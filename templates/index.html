<!DOCTYPE html>
<html>
<head>
    <title>ScalingoOps Agent</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            margin: 0;
            background-color: #f8f9fa;
        }
        #messages {
            list-style-type: none;
            margin: 0;
            padding: 20px;
            overflow-y: scroll;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        #messages li {
            padding: 10px 15px;
            border-radius: 18px;
            line-height: 1.4;
            max-width: 75%;
            word-wrap: break-word;
        }
        .user { background-color: #007bff; color: white; align-self: flex-end; margin-left: auto; }
        .bot { background-color: #e9ecef; color: #343a40; align-self: flex-start; }
        .deployment-card {
            background: white;
            border: 1px solid #dee2e6;
            border-radius: 14px;
            padding: 12px;
            width: min(560px, 90vw);
            box-shadow: 0 1px 2px rgba(0,0,0,0.04);
        }
        .deployment-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
            gap: 12px;
            font-size: 14px;
        }
        .deployment-title { font-weight: 600; color: #243447; }
        .deployment-meta { color: #6c757d; font-size: 12px; }
        .progress-wrap {
            background: #eef1f5;
            border-radius: 999px;
            overflow: hidden;
            height: 8px;
            margin: 8px 0 10px;
        }
        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #0d6efd 0%, #32a1ff 100%);
            transition: width 350ms ease;
        }
        .steps {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 4px;
            font-size: 11px;
            color: #6c757d;
            margin-bottom: 8px;
        }
        .step { text-align: center; }
        .step.active { color: #0d6efd; font-weight: 600; }
        .step.done { color: #198754; font-weight: 600; }
        .status-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 13px;
            gap: 12px;
        }
        .status-left {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
        }
        .status-text {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 330px;
        }
        .spinner {
            width: 12px;
            height: 12px;
            border: 2px solid #d0d7df;
            border-top-color: #0d6efd;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
            display: inline-block;
        }
        .waiting-guy {
            font-size: 14px;
            animation: bob 1.2s ease-in-out infinite;
        }
        .hidden { display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes bob {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-1px); }
        }
        #form { display: flex; padding: 10px; border-top: 1px solid #dee2e6; background-color: #fff; }
        #input { border: 1px solid #ced4da; padding: 10px; font-size: 16px; flex-grow: 1; border-radius: 20px; outline: none; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 20px; margin-left: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <ul id="messages"></ul>
    <form id="form" action="" onsubmit="sendMessage(event)">
        <input id="input" autocomplete="off" placeholder="Envoyez un message..." /><button>Envoyer</button>
    </form>
    <script>
        const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const ws = new WebSocket(`${wsProtocol}//${window.location.host}/ws`);
        const messages = document.getElementById('messages');
        const deploymentCards = new Map();
        const deploymentTimers = new Map();

        const statusOrder = ["queued", "building", "pushing", "starting", "success"];
        const statusProgress = { queued: 10, building: 45, pushing: 70, starting: 90, success: 100 };

        ws.onmessage = function(event) {
            let data = null;
            try {
                data = JSON.parse(event.data);
            } catch (err) {
                data = null;
            }

            if (data && data.type && data.deployment_id) {
                handleDeploymentEvent(data);
                return;
            }

            appendMessage("bot", event.data);
        };

        function appendMessage(kind, text) {
            const li = document.createElement('li');
            li.className = kind;
            li.textContent = text;
            messages.appendChild(li);
            messages.scrollTop = messages.scrollHeight;
        }

        function createDeploymentCard(data) {
            const id = data.deployment_id;
            if (deploymentCards.has(id)) {
                return deploymentCards.get(id);
            }

            const li = document.createElement("li");
            li.className = "bot deployment-card";
            li.dataset.deploymentId = id;

            const appName = data.app_name || id;
            li.innerHTML = `
                <div class="deployment-head">
                    <div class="deployment-title">Deployment ${appName}</div>
                    <div class="deployment-meta" data-role="elapsed">00:00</div>
                </div>
                <div class="progress-wrap">
                    <div class="progress-bar" data-role="bar"></div>
                </div>
                <div class="steps" data-role="steps">
                    <div class="step" data-step="queued">Queued</div>
                    <div class="step" data-step="building">Build</div>
                    <div class="step" data-step="pushing">Push</div>
                    <div class="step" data-step="starting">Start</div>
                    <div class="step" data-step="success">Done</div>
                </div>
                <div class="status-row">
                    <div class="status-left">
                        <span class="spinner" data-role="spinner"></span>
                        <span class="waiting-guy" data-role="guy">🧍</span>
                        <span class="status-text" data-role="statusText">Deployment started...</span>
                    </div>
                    <div class="deployment-meta" data-role="progressText">0%</div>
                </div>
            `;

            messages.appendChild(li);
            messages.scrollTop = messages.scrollHeight;
            deploymentCards.set(id, li);

            const startedAt = Date.now();
            const timer = setInterval(() => {
                const elapsed = Math.floor((Date.now() - startedAt) / 1000);
                const mm = String(Math.floor(elapsed / 60)).padStart(2, "0");
                const ss = String(elapsed % 60).padStart(2, "0");
                li.querySelector('[data-role="elapsed"]').textContent = `${mm}:${ss}`;
            }, 1000);
            deploymentTimers.set(id, timer);
            return li;
        }

        function normalizeProgress(data) {
            if (typeof data.progress === "number") return data.progress;
            if (statusProgress[data.status] !== undefined) return statusProgress[data.status];
            return 0;
        }

        function markSteps(card, status, final, isError) {
            const steps = card.querySelectorAll(".step");
            const idx = statusOrder.indexOf(status);

            steps.forEach((stepEl) => {
                const step = stepEl.dataset.step;
                const stepIdx = statusOrder.indexOf(step);
                stepEl.classList.remove("active", "done");

                if (idx >= 0 && stepIdx < idx) stepEl.classList.add("done");
                if (!final && step === status) stepEl.classList.add("active");
                if (final && !isError && step === "success") stepEl.classList.add("done");
                if (final && isError && stepIdx <= Math.max(idx, 3)) stepEl.classList.add("done");
            });
        }

        function finalizeCard(id, card, text, progress, isError) {
            card.querySelector('[data-role="bar"]').style.width = `${progress}%`;
            card.querySelector('[data-role="progressText"]').textContent = `${progress}%`;
            card.querySelector('[data-role="statusText"]').textContent = text;
            card.querySelector('[data-role="spinner"]').classList.add("hidden");
            card.querySelector('[data-role="guy"]').textContent = isError ? "⚠️" : "✅";
            const timer = deploymentTimers.get(id);
            if (timer) {
                clearInterval(timer);
                deploymentTimers.delete(id);
            }
        }

        function handleDeploymentEvent(data) {
            const id = data.deployment_id;
            const card = createDeploymentCard(data);
            const isError = Boolean(data.error_kind) || (data.final && data.status !== "success");
            const text = data.phase_label || data.message || data.status || "In progress";
            const progress = normalizeProgress(data);
            const final = Boolean(data.final) || data.type === "deployment_finished";

            card.querySelector('[data-role="bar"]').style.width = `${progress}%`;
            card.querySelector('[data-role="progressText"]').textContent = `${progress}%`;
            card.querySelector('[data-role="statusText"]').textContent = text;
            markSteps(card, data.status, final, isError);

            if (final) {
                finalizeCard(id, card, text, progress, isError);
                appendMessage("bot", isError ? `❌ Deployment failed for ${data.app_name || id}.` : `✅ Deployment successful for ${data.app_name || id}.`);
            } else if (data.type === "deployment_started") {
                appendMessage("bot", `🚀 Deployment launched for ${data.app_name || id}.`);
            }
        }

        function sendMessage(event) {
            event.preventDefault();
            const input = document.getElementById('input');
            if (input.value) {
                appendMessage("user", input.value);
                ws.send(input.value);
                input.value = '';
            }
        }
    </script>
</body>
</html>
