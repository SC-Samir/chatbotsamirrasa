<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>ScalingoOps Agent</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ["Sora", "Manrope", "Avenir Next", "Segoe UI", "sans-serif"]
                    },
                    keyframes: {
                        floatSlow: {
                            "0%,100%": { transform: "translate3d(0,0,0)" },
                            "50%": { transform: "translate3d(0,-8px,0)" }
                        },
                        fadeSlide: {
                            "0%": { opacity: "0", transform: "translate3d(0,10px,0)" },
                            "100%": { opacity: "1", transform: "translate3d(0,0,0)" }
                        },
                        softPulse: {
                            "0%,100%": { opacity: "1" },
                            "50%": { opacity: ".7" }
                        },
                        scan: {
                            "0%": { backgroundPosition: "180% 0" },
                            "100%": { backgroundPosition: "-180% 0" }
                        }
                    },
                    animation: {
                        floatSlow: "floatSlow 8s ease-in-out infinite",
                        fadeSlide: "fadeSlide 260ms cubic-bezier(.22,.61,.36,1)",
                        softPulse: "softPulse 1.4s ease-in-out infinite",
                        scan: "scan 2s linear infinite"
                    },
                    boxShadow: {
                        neon: "0 0 0 1px rgba(125,211,252,.25),0 12px 32px rgba(14,116,144,.22)",
                        card: "0 12px 30px rgba(2,6,23,.28)"
                    }
                }
            }
        }
    </script>
    <style>
        .bg-mesh {
            background:
                radial-gradient(1200px 520px at 8% -10%, rgba(16, 185, 129, 0.18), transparent 55%),
                radial-gradient(900px 420px at 92% 0%, rgba(56, 189, 248, 0.2), transparent 58%),
                linear-gradient(135deg, #020617 0%, #0b1733 50%, #0f2d59 100%);
        }

        @media (prefers-reduced-motion: reduce) {
            .motion-safe\:animate-fadeSlide,
            .motion-safe\:animate-floatSlow,
            .motion-safe\:animate-softPulse,
            .motion-safe\:animate-scan,
            .animate-spin,
            .animate-bounce,
            .animate-pulse {
                animation: none !important;
            }
        }
    </style>
</head>
<body class="min-h-screen bg-slate-950 font-sans text-slate-100">
    <div class="bg-mesh fixed inset-0"></div>
    <div class="pointer-events-none fixed inset-0 bg-[radial-gradient(circle_at_20%_10%,rgba(56,189,248,0.16),transparent_35%),radial-gradient(circle_at_85%_85%,rgba(52,211,153,0.14),transparent_35%)]"></div>

    <main class="relative z-10 mx-auto flex h-screen w-full max-w-5xl flex-col p-4 sm:p-6">
        <section class="flex h-full min-h-0 flex-col overflow-hidden rounded-[2rem] border border-white/15 bg-slate-900/60 shadow-card backdrop-blur-xl">
            <header class="border-b border-white/10 px-5 py-4 sm:px-7 sm:py-5">
                <div class="flex items-center justify-between gap-4">
                    <div>
                        <p class="text-xs font-semibold uppercase tracking-[0.2em] text-sky-200/80">Scalingo Assistant</p>
                        <h1 class="mt-1 text-xl font-extrabold tracking-tight text-white sm:text-3xl">Chatbot Ops Console</h1>
                        <p class="mt-1 text-xs text-slate-300 sm:text-sm">Pilote tes actions infra en conversation, avec suivi de deploiement en direct.</p>
                    </div>
                    <span class="hidden rounded-full border border-emerald-200/30 bg-emerald-300/15 px-3 py-1 text-xs font-bold text-emerald-100 sm:inline-flex">Live</span>
                </div>
            </header>

            <ul id="messages" class="flex min-h-0 flex-1 flex-col gap-3 overflow-y-auto px-4 py-4 sm:px-6 sm:py-6"></ul>

            <form id="form" action="" onsubmit="sendMessage(event)" class="border-t border-white/10 bg-slate-950/30 p-3 sm:p-4">
                <div class="grid grid-cols-[1fr_auto] gap-2 sm:gap-3">
                    <input
                        id="input"
                        autocomplete="off"
                        placeholder="Ex: deploy mon-app, logs mon-app, status"
                        class="w-full rounded-2xl border border-white/15 bg-slate-900/80 px-4 py-3 text-sm text-slate-100 outline-none transition placeholder:text-slate-400 focus:border-sky-300 focus:ring-4 focus:ring-sky-400/20 sm:text-base"
                    />
                    <button id="sendButton" class="rounded-2xl bg-gradient-to-r from-sky-300 to-emerald-300 px-5 py-3 text-sm font-extrabold text-slate-900 shadow-neon transition hover:brightness-105 active:scale-[0.99] disabled:cursor-not-allowed disabled:opacity-50 sm:text-base">
                        Envoyer
                    </button>
                </div>
            </form>
        </section>
    </main>

    <script>
        const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const ws = new WebSocket(`${wsProtocol}//${window.location.host}/ws`);
        const messages = document.getElementById('messages');
        const inputEl = document.getElementById('input');
        const sendButtonEl = document.getElementById('sendButton');
        const deploymentCards = new Map();
        const deploymentTimers = new Map();
        let lastUserCommand = "";
        let isAwaitingResponse = false;
        let pendingCommandCard = null;
        let pendingCommandTimer = null;
        let activeLogsCard = null;
        let activeBotCard = null;
        let activeBotIntent = null;

        const statusOrder = ["queued", "building", "pushing", "starting", "success"];
        const statusProgress = { queued: 10, building: 45, pushing: 70, starting: 90, success: 100 };

        function setComposerLocked(locked) {
            isAwaitingResponse = locked;
            inputEl.disabled = locked;
            sendButtonEl.disabled = locked;
            inputEl.placeholder = locked ? "Attends la reponse du bot..." : "Ex: deploy mon-app, logs mon-app, status";
        }

        function clearPendingCommandCard(finalText) {
            if (!pendingCommandCard) return;
            if (pendingCommandTimer) {
                clearInterval(pendingCommandTimer);
                pendingCommandTimer = null;
            }
            const status = pendingCommandCard.querySelector('[data-role="pendingStatus"]');
            const walker = pendingCommandCard.querySelector('[data-role="pendingWalker"]');
            status.textContent = finalText || "Reponse recue, traitement termine.";
            walker.textContent = "OK";
            pendingCommandCard = null;
        }

        function createPendingCommandCard(command) {
            clearPendingCommandCard();
            const li = document.createElement("li");
            li.className = "motion-safe:animate-fadeSlide w-full max-w-[96%] rounded-2xl border border-amber-200/30 bg-gradient-to-br from-slate-900 to-amber-950/40 p-4 shadow-card sm:max-w-[84%]";
            li.innerHTML = `
                <div class="mb-2 flex items-center justify-between gap-2">
                    <p class="text-sm font-bold text-amber-100">Commande en cours</p>
                    <span class="rounded-full border border-amber-200/30 bg-amber-300/10 px-2 py-0.5 text-[10px] font-semibold uppercase tracking-wide text-amber-100">processing</span>
                </div>
                <p class="text-xs text-amber-100/80">"${escapeHtml(command)}"</p>
                <div class="mt-3 relative h-5 rounded-full border border-white/10 bg-slate-950/40">
                    <div class="absolute left-0 right-0 top-1/2 h-px -translate-y-1/2 bg-white/20"></div>
                    <span class="absolute left-[2%] top-1/2 -translate-y-1/2 text-sm transition-all duration-300" data-role="pendingWalker">o/</span>
                </div>
                <p class="mt-2 text-xs text-slate-200" data-role="pendingStatus">Je traite ta commande et je prepare une reponse claire...</p>
            `;

            messages.appendChild(li);
            messages.scrollTop = messages.scrollHeight;
            pendingCommandCard = li;

            let progress = 2;
            pendingCommandTimer = setInterval(() => {
                if (!pendingCommandCard) return;
                progress = Math.min(progress + 8, 92);
                pendingCommandCard.querySelector('[data-role="pendingWalker"]').style.left = `calc(${progress}% - 10px)`;
            }, 320);
        }

        ws.onmessage = function(event) {
            setComposerLocked(false);
            clearPendingCommandCard("Reponse recue.");
            let data = null;
            try {
                data = JSON.parse(event.data);
            } catch (err) {
                data = null;
            }

            if (data && data.type && data.deployment_id) {
                handleDeploymentEvent(data);
                return;
            }

            appendMessage("bot", event.data);
        };

        function statusBadgeClasses(status) {
            if (status === "success") return "border-emerald-200/35 bg-emerald-300/20 text-emerald-100";
            if (status === "warning") return "border-amber-200/35 bg-amber-300/20 text-amber-100";
            if (status === "error") return "border-rose-200/35 bg-rose-300/20 text-rose-100";
            if (status === "requires_confirmation") return "border-fuchsia-200/35 bg-fuchsia-300/20 text-fuchsia-100";
            return "border-white/15 bg-white/10 text-slate-200";
        }

        function eventToneClasses(eventType, status) {
            if ((eventType || "").startsWith("deployments.") || eventType === "legacy.show_logs") return "border-cyan-300/40";
            if ((eventType || "").startsWith("apps.")) return "border-sky-300/40";
            if (status === "error") return "border-rose-300/40";
            if (status === "warning") return "border-amber-300/40";
            return "border-white/15";
        }

        function formatEventLabel(eventType) {
            return (eventType || "system.message").replaceAll(".", " · ");
        }

        function extractPayloadHighlights(payload) {
            if (!payload || typeof payload !== "object") return [];
            const highlights = [];
            const app = payload.app || {};
            const deployment = payload.deployment || {};
            const preview = payload.preview;

            if (app.name) highlights.push({ k: "App", v: app.name });
            if (app.region) highlights.push({ k: "Region", v: app.region });
            if (app.url) highlights.push({ k: "URL", v: app.url });
            if (deployment.id) highlights.push({ k: "Deployment", v: deployment.id });
            if (deployment.status) highlights.push({ k: "Statut deploy", v: deployment.status });
            if (deployment.git_ref) highlights.push({ k: "Git ref", v: deployment.git_ref });
            if (typeof preview === "string" && preview.trim()) highlights.push({ k: "Action", v: preview });

            if (!highlights.length) {
                for (const [k, v] of Object.entries(payload).slice(0, 5)) {
                    if (v === null || v === undefined) continue;
                    if (typeof v === "string" || typeof v === "number" || typeof v === "boolean") {
                        highlights.push({ k, v: String(v) });
                    }
                }
            }
            return highlights.slice(0, 6);
        }

        function parseWsEnvelope(text) {
            try {
                const parsed = JSON.parse(text);
                if (!parsed || typeof parsed !== "object") return null;
                if (!parsed.version || !parsed.event_type || !parsed.status) return null;
                return parsed;
            } catch (e) {
                return null;
            }
        }

        function classifyBotMessage(text, envelope) {
            if (envelope) {
                const ev = String(envelope.event_type || "");
                if (ev.startsWith("deployments.") || ev === "legacy.show_logs") return "deploy";
                if (ev.includes("log")) return "logs";
                if (ev.startsWith("apps.") || ev.startsWith("domains.") || ev.startsWith("events.")) return "context";
            }
            const lower = (text || "").toLowerCase();
            if (lower.includes("log") || lower.includes("tail")) return "logs";
            if (lower.includes("context") || lower.includes("analyse") || lower.includes("analysis")) return "context";
            if (lower.includes("deploy") || lower.includes("building") || lower.includes("starting")) return "deploy";
            return "default";
        }

        function getBotExplanation(intent, text) {
            if (intent === "deploy") return "Je suis en train d'orchestrer le pipeline de deploiement et de suivre les etapes en temps reel.";
            if (intent === "logs") return "Je recupere les derniers logs utiles pour te donner une vue rapide de ce qui se passe.";
            if (intent === "context") return "Je fais une lecture du contexte applicatif pour expliquer l'etat et les impacts possibles.";
            if ((text || "").toLowerCase().includes("error") || (text || "").toLowerCase().includes("failed")) {
                return "Une erreur est remontee. Je te donne le signal principal et la sortie brute pour debug.";
            }
            if (lastUserCommand) return `Commande detectee: "${lastUserCommand}". Voici le resultat interprete.`;
            return "Voici le resultat de l'action, resume de facon lisible.";
        }

        function escapeHtml(value) {
            return (value || "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#39;");
        }

        function appendBotCard(text) {
            const envelope = parseWsEnvelope(text);
            const intent = classifyBotMessage(text, envelope);
            const safeText = escapeHtml(text);

            if (intent === "logs" && activeLogsCard) {
                const pre = activeLogsCard.querySelector('[data-role="logsBody"]');
                pre.textContent = pre.textContent ? `${pre.textContent}\n${text}` : text;
                messages.scrollTop = messages.scrollHeight;
                return;
            }

            if (intent !== "deploy" && intent !== "logs" && activeBotCard && activeBotIntent === intent) {
                const body = activeBotCard.querySelector('[data-role="botBody"]');
                body.textContent = body.textContent ? `${body.textContent}\n${text}` : text;
                messages.scrollTop = messages.scrollHeight;
                return;
            }

            const li = document.createElement("li");
            li.className = "motion-safe:animate-fadeSlide w-full max-w-[96%] rounded-2xl border bg-slate-900/80 p-4 shadow-card sm:max-w-[84%]";
            li.classList.add(eventToneClasses(envelope?.event_type, envelope?.status));

            const explanation = getBotExplanation(intent, envelope?.human_message || text);
            const isLong = (text || "").length > 180 || (text || "").includes("\n");
            const rawPayload = envelope ? JSON.stringify(envelope.structured_payload || {}, null, 2) : text;
            const safePayload = escapeHtml(rawPayload);
            const actions = envelope && Array.isArray(envelope.next_actions) ? envelope.next_actions.filter(Boolean) : [];
            const highlights = envelope ? extractPayloadHighlights(envelope.structured_payload || {}) : [];

            li.innerHTML = `
                <div class="flex items-start gap-3">
                    <div class="mt-0.5 flex h-8 w-8 shrink-0 items-center justify-center rounded-full bg-gradient-to-br from-sky-300 to-emerald-300 text-xs font-black text-slate-900">AI</div>
                    <div class="min-w-0 flex-1">
                        <div class="flex items-center gap-2">
                            <p class="text-sm font-bold text-white">Assistant Ops</p>
                            <span class="rounded-full border border-white/15 bg-white/5 px-2 py-0.5 text-[10px] uppercase tracking-wide text-slate-300">${intent}</span>
                            ${envelope ? `<span class="rounded-full border px-2 py-0.5 text-[10px] font-bold uppercase tracking-wide ${statusBadgeClasses(envelope.status)}">${escapeHtml(envelope.status)}</span>` : ""}
                        </div>
                        ${envelope ? `<p class="mt-1 text-[11px] uppercase tracking-[0.14em] text-slate-400">${escapeHtml(formatEventLabel(envelope.event_type))}</p>` : ""}
                        <p class="mt-1 text-sm text-slate-200">${explanation}</p>
                        ${envelope && envelope.human_message ? `<pre class="mt-2 rounded-xl border border-white/10 bg-slate-950/40 px-3 py-2 text-sm text-slate-100 whitespace-pre-wrap">${escapeHtml(envelope.human_message)}</pre>` : ""}
                        ${highlights.length ? `<div class="mt-3 grid gap-2 sm:grid-cols-2">${highlights.map((item) => `<div class="rounded-xl border border-white/10 bg-slate-950/40 px-3 py-2"><p class="text-[10px] uppercase tracking-wide text-slate-400">${escapeHtml(item.k)}</p><p class="mt-0.5 text-xs text-slate-100 break-all">${escapeHtml(item.v)}</p></div>`).join("")}</div>` : ""}
                        ${actions.length ? `<div class="mt-3 flex flex-wrap gap-2">${actions.map((action) => `<code class="rounded-full border border-sky-200/30 bg-sky-300/10 px-2 py-1 text-xs text-sky-100">${escapeHtml(action)}</code>`).join("")}</div>` : ""}
                        ${(isLong || envelope)
                            ? `<details class="mt-3 rounded-xl border border-white/10 bg-slate-950/50 p-2">
                                <summary class="cursor-pointer text-xs font-semibold text-slate-300">Details techniques (JSON)</summary>
                                <pre class="mt-2 max-h-72 overflow-auto whitespace-pre-wrap text-xs text-slate-200" ${intent === "logs" ? 'data-role="logsBody"' : ""}>${safePayload}</pre>
                            </details>`
                            : `<pre class="mt-2 rounded-xl border border-white/10 bg-slate-950/50 px-3 py-2 text-sm text-slate-100 whitespace-pre-wrap" ${intent === "logs" ? 'data-role="logsBody"' : 'data-role="botBody"'}>${safeText}</pre>`
                        }
                    </div>
                </div>
            `;

            messages.appendChild(li);
            if (intent === "logs") activeLogsCard = li;
            else activeLogsCard = null;
            if (intent !== "deploy" && intent !== "logs" && !isLong) {
                activeBotCard = li;
                activeBotIntent = intent;
            } else {
                activeBotCard = null;
                activeBotIntent = null;
            }
            messages.scrollTop = messages.scrollHeight;
        }

        function appendMessage(kind, text) {
            if (kind === "bot") {
                appendBotCard(text);
                return;
            }

            const li = document.createElement('li');
            li.className = "motion-safe:animate-fadeSlide max-w-[92%] rounded-2xl border px-4 py-3 text-sm leading-relaxed shadow-sm sm:max-w-[80%] sm:text-[15px]";

            li.classList.add(
                "ml-auto",
                "border-sky-100/70",
                "bg-gradient-to-br",
                "from-sky-100",
                "to-emerald-100",
                "text-slate-900",
                "shadow-md",
                "shadow-sky-500/20"
            );

            li.textContent = text;
            messages.appendChild(li);
            messages.scrollTop = messages.scrollHeight;
        }

        function createDeploymentCard(data) {
            const id = data.deployment_id;
            if (deploymentCards.has(id)) return deploymentCards.get(id);

            const li = document.createElement("li");
            li.className = "motion-safe:animate-fadeSlide w-full max-w-[96%] rounded-2xl border border-sky-200/30 bg-gradient-to-br from-slate-900 to-sky-950/70 p-4 shadow-card sm:max-w-[84%]";
            li.dataset.deploymentId = id;

            const appName = data.app_name || id;
            li.innerHTML = `
                <div class="mb-2 flex items-center justify-between gap-3 text-sm">
                    <div class="font-bold tracking-wide text-sky-100">Deployment ${appName}</div>
                    <div class="text-xs text-sky-200/85" data-role="elapsed">00:00</div>
                </div>
                <div class="mb-3 h-2.5 overflow-hidden rounded-full bg-white/15">
                    <div class="h-full w-0 bg-gradient-to-r from-sky-300 to-emerald-300 transition-all duration-300" data-role="bar"></div>
                </div>
                <div class="mb-3 relative h-5 rounded-full border border-white/10 bg-slate-950/40">
                    <div class="absolute left-0 right-0 top-1/2 h-px -translate-y-1/2 bg-white/20"></div>
                    <span class="absolute top-1/2 -translate-y-1/2 text-sm transition-all duration-300" data-role="walker">o/</span>
                </div>
                <div class="mb-2 grid grid-cols-5 gap-1.5 text-[10px] text-sky-100/80 sm:text-[11px]" data-role="steps">
                    <div class="step rounded-full bg-white/10 px-1 py-1 text-center" data-step="queued">Queued</div>
                    <div class="step rounded-full bg-white/10 px-1 py-1 text-center" data-step="building">Build</div>
                    <div class="step rounded-full bg-white/10 px-1 py-1 text-center" data-step="pushing">Push</div>
                    <div class="step rounded-full bg-white/10 px-1 py-1 text-center" data-step="starting">Start</div>
                    <div class="step rounded-full bg-white/10 px-1 py-1 text-center" data-step="success">Done</div>
                </div>
                <div class="flex items-center justify-between gap-2 text-xs sm:text-sm">
                    <div class="min-w-0 flex items-center gap-2">
                        <span class="inline-block h-3.5 w-3.5 animate-spin rounded-full border-2 border-slate-200/40 border-t-cyan-200" data-role="spinner"></span>
                        <span class="font-semibold text-sky-100" data-role="guy">en cours</span>
                        <span class="max-w-[200px] truncate text-slate-100 sm:max-w-[420px]" data-role="statusText">Deployment started...</span>
                    </div>
                    <div class="text-sky-100/85" data-role="progressText">0%</div>
                </div>
            `;

            messages.appendChild(li);
            messages.scrollTop = messages.scrollHeight;
            deploymentCards.set(id, li);

            const startedAt = Date.now();
            const timer = setInterval(() => {
                const elapsed = Math.floor((Date.now() - startedAt) / 1000);
                const mm = String(Math.floor(elapsed / 60)).padStart(2, "0");
                const ss = String(elapsed % 60).padStart(2, "0");
                li.querySelector('[data-role="elapsed"]').textContent = `${mm}:${ss}`;
            }, 1000);
            deploymentTimers.set(id, timer);
            return li;
        }

        function normalizeProgress(data) {
            if (typeof data.progress === "number") return data.progress;
            if (statusProgress[data.status] !== undefined) return statusProgress[data.status];
            return 0;
        }

        function markSteps(card, status, final, isError) {
            const steps = card.querySelectorAll(".step");
            const idx = statusOrder.indexOf(status);

            steps.forEach((stepEl) => {
                const step = stepEl.dataset.step;
                const stepIdx = statusOrder.indexOf(step);
                stepEl.className = "step rounded-full bg-white/10 px-1 py-1 text-center";

                if (idx >= 0 && stepIdx < idx) stepEl.classList.add("bg-emerald-300", "font-extrabold", "text-slate-900");
                if (!final && step === status) stepEl.classList.add("bg-sky-300/35", "font-bold", "text-white");
                if (final && !isError && step === "success") stepEl.classList.add("bg-emerald-300", "font-extrabold", "text-slate-900");
                if (final && isError && stepIdx <= Math.max(idx, 3)) stepEl.classList.add("bg-amber-300", "font-bold", "text-slate-900");
            });
        }

        function finalizeCard(id, card, text, progress, isError) {
            card.querySelector('[data-role="bar"]').style.width = `${progress}%`;
            card.querySelector('[data-role="progressText"]').textContent = `${progress}%`;
            card.querySelector('[data-role="statusText"]').textContent = text;
            card.querySelector('[data-role="spinner"]').classList.add("hidden");
            card.querySelector('[data-role="guy"]').textContent = isError ? "bloque" : "termine";
            const timer = deploymentTimers.get(id);
            if (timer) {
                clearInterval(timer);
                deploymentTimers.delete(id);
            }
        }

        function handleDeploymentEvent(data) {
            const id = data.deployment_id;
            const card = createDeploymentCard(data);
            const isError = Boolean(data.error_kind) || (data.final && data.status !== "success");
            const text = data.phase_label || data.message || data.status || "In progress";
            const progress = normalizeProgress(data);
            const final = Boolean(data.final) || data.type === "deployment_finished";

            card.querySelector('[data-role="bar"]').style.width = `${progress}%`;
            card.querySelector('[data-role="progressText"]').textContent = `${progress}%`;
            card.querySelector('[data-role="statusText"]').textContent = text;
            card.querySelector('[data-role="walker"]').style.left = `calc(${Math.max(2, Math.min(96, progress))}% - 10px)`;
            markSteps(card, data.status, final, isError);

            if (final) {
                finalizeCard(id, card, text, progress, isError);
                appendMessage("bot", isError ? `[ERROR] Deployment failed for ${data.app_name || id}.` : `[OK] Deployment successful for ${data.app_name || id}.`);
            } else if (data.type === "deployment_started") {
                appendMessage("bot", `Deployment launched for ${data.app_name || id}.`);
            }
        }

        function sendMessage(event) {
            event.preventDefault();
            if (isAwaitingResponse) return;
            if (inputEl.value) {
                appendMessage("user", inputEl.value);
                lastUserCommand = inputEl.value.trim();
                activeLogsCard = null;
                activeBotCard = null;
                activeBotIntent = null;
                createPendingCommandCard(lastUserCommand);
                setComposerLocked(true);
                ws.send(inputEl.value);
                inputEl.value = '';
            }
        }
