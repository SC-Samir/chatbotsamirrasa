<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>ScalingoOps Command Center</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ["Space Grotesk", "Avenir Next", "Segoe UI", "sans-serif"],
            mono: ["IBM Plex Mono", "ui-monospace", "monospace"]
          },
          colors: {
            cmd: {
              bg0: "#0b0a08",
              bg1: "#15120d",
              bg2: "#231d14",
              line: "#3a2f1f",
              amber: "#f2b96c",
              green: "#8fdfa9",
              red: "#f58a7b",
              text: "#f4ead7",
              mute: "#c8b89d"
            }
          },
          keyframes: {
            riseIn: {
              "0%": { opacity: "0", transform: "translate3d(0,10px,0)" },
              "100%": { opacity: "1", transform: "translate3d(0,0,0)" }
            },
            pulseSignal: {
              "0%,100%": { opacity: "1" },
              "50%": { opacity: ".45" }
            },
            radarSweep: {
              "0%": { transform: "rotate(0deg)" },
              "100%": { transform: "rotate(360deg)" }
            }
          },
          animation: {
            riseIn: "riseIn 260ms cubic-bezier(.21,.84,.32,1)",
            pulseSignal: "pulseSignal 1.5s ease-in-out infinite",
            radarSweep: "radarSweep 9s linear infinite"
          },
          boxShadow: {
            panel: "0 20px 45px rgba(0,0,0,.42)",
            glow: "0 0 0 1px rgba(242,185,108,.35), 0 12px 30px rgba(242,185,108,.15)"
          }
        }
      }
    }
  </script>
  <style>
    :root {
      --scanline: repeating-linear-gradient(to bottom, rgba(255,255,255,.03), rgba(255,255,255,.03) 1px, transparent 1px, transparent 4px);
      --grid: linear-gradient(rgba(242,185,108,.07) 1px, transparent 1px), linear-gradient(90deg, rgba(242,185,108,.07) 1px, transparent 1px);
    }

    .cmd-atmosphere {
      background:
        radial-gradient(1200px 560px at 5% -8%, rgba(242,185,108,.15), transparent 55%),
        radial-gradient(900px 480px at 96% 0%, rgba(143,223,169,.15), transparent 60%),
        linear-gradient(135deg, #0b0a08 0%, #141009 46%, #1d1710 100%);
    }

    .cmd-grid {
      background-image: var(--grid);
      background-size: 40px 40px;
      mask-image: radial-gradient(ellipse at center, #000 30%, transparent 80%);
      opacity: .4;
    }

    .cmd-scanline {
      background-image: var(--scanline);
      mix-blend-mode: soft-light;
      opacity: .28;
    }

    .radar {
      position: relative;
      overflow: hidden;
    }

    .radar::before {
      content: "";
      position: absolute;
      inset: -45%;
      background: conic-gradient(from 0deg, transparent 0deg, rgba(242,185,108,.25) 55deg, transparent 95deg);
      animation: radarSweep 9s linear infinite;
      pointer-events: none;
    }

    @media (prefers-reduced-motion: reduce) {
      .motion-safe\:animate-riseIn,
      .motion-safe\:animate-pulseSignal,
      .motion-safe\:animate-radarSweep,
      .animate-spin,
      .animate-pulse {
        animation: none !important;
      }
    }
  </style>
</head>
<body class="min-h-screen bg-cmd-bg0 font-sans text-cmd-text">
  <div class="cmd-atmosphere fixed inset-0"></div>
  <div class="cmd-grid pointer-events-none fixed inset-0"></div>
  <div class="cmd-scanline pointer-events-none fixed inset-0"></div>

  <main class="relative z-10 mx-auto flex h-screen w-full max-w-6xl flex-col p-3 sm:p-5">
    <section class="flex h-full min-h-0 flex-col overflow-hidden rounded-[1.6rem] border border-cmd-line bg-cmd-bg1/90 shadow-panel backdrop-blur-sm">
      <header class="border-b border-cmd-line px-4 py-4 sm:px-6">
        <div class="flex flex-wrap items-start justify-between gap-4">
          <div>
            <p class="text-[11px] font-bold uppercase tracking-[0.24em] text-cmd-amber/85">Scalingo Command Center</p>
            <h1 class="mt-1 text-2xl font-bold tracking-tight text-cmd-text sm:text-3xl">Live Ops Demo Console</h1>
            <p class="mt-1 max-w-2xl text-sm text-cmd-mute">Pilote les operations infra par conversation avec des retours lisibles, axes actionnables, et suivi live du deploiement.</p>
          </div>
          <div class="radar w-full max-w-[240px] rounded-2xl border border-cmd-line bg-cmd-bg2/60 p-3 sm:w-auto">
            <p class="relative z-10 text-[10px] font-semibold uppercase tracking-[0.16em] text-cmd-mute">Session</p>
            <div class="relative z-10 mt-2 flex items-center justify-between gap-3">
              <span id="connectionBadge" class="inline-flex items-center gap-2 rounded-full border border-cmd-green/30 bg-cmd-green/10 px-3 py-1 text-xs font-bold text-cmd-green">
                <span id="connectionDot" class="h-2 w-2 rounded-full bg-cmd-green motion-safe:animate-pulseSignal"></span>
                Connected
              </span>
              <span class="text-xs font-mono text-cmd-mute">ws.v2</span>
            </div>
          </div>
        </div>
      </header>

      <section class="border-b border-cmd-line/70 px-4 py-3 sm:px-6">
        <p class="text-[10px] font-semibold uppercase tracking-[0.14em] text-cmd-mute">Demo Prompts</p>
        <div class="mt-2 grid gap-2 sm:grid-cols-2 lg:grid-cols-4">
          <label class="text-[10px] uppercase tracking-[0.12em] text-cmd-mute">
            Region
            <input id="demoRegion" type="text" value="osc-fr1" class="mt-1 w-full rounded-lg border border-cmd-line bg-cmd-bg2/70 px-2 py-1 text-xs text-cmd-text outline-none focus:border-cmd-amber">
          </label>
          <label class="text-[10px] uppercase tracking-[0.12em] text-cmd-mute">
            App
            <input id="demoApp" type="text" value="samirtest4" class="mt-1 w-full rounded-lg border border-cmd-line bg-cmd-bg2/70 px-2 py-1 text-xs text-cmd-text outline-none focus:border-cmd-amber">
          </label>
          <label class="text-[10px] uppercase tracking-[0.12em] text-cmd-mute">
            Github Repo
            <input id="demoRepo" type="text" value="https://github.com/Scalingo/sample-go-gin" class="mt-1 w-full rounded-lg border border-cmd-line bg-cmd-bg2/70 px-2 py-1 text-xs text-cmd-text outline-none focus:border-cmd-amber">
          </label>
          <label class="text-[10px] uppercase tracking-[0.12em] text-cmd-mute">
            Branch
            <input id="demoBranch" type="text" value="master" class="mt-1 w-full rounded-lg border border-cmd-line bg-cmd-bg2/70 px-2 py-1 text-xs text-cmd-text outline-none focus:border-cmd-amber">
          </label>
        </div>
        <div id="promptChips" class="mt-2 flex max-h-44 flex-wrap gap-2 overflow-y-auto pr-1"></div>
      </section>

      <ul id="messages" class="flex min-h-0 flex-1 flex-col gap-3 overflow-y-auto px-4 py-4 sm:px-6"></ul>

      <form id="form" action="" onsubmit="sendMessage(event)" class="border-t border-cmd-line bg-cmd-bg1/70 p-3 sm:p-4">
        <div class="grid grid-cols-[1fr_auto] gap-2 sm:gap-3">
          <input
            id="input"
            autocomplete="off"
            placeholder="Ex: list apps on osc-fr1"
            class="w-full rounded-2xl border border-cmd-line bg-cmd-bg2/70 px-4 py-3 text-sm text-cmd-text outline-none transition placeholder:text-cmd-mute focus:border-cmd-amber focus:ring-4 focus:ring-cmd-amber/15 sm:text-base"
          />
          <button id="sendButton" class="rounded-2xl bg-gradient-to-r from-cmd-amber to-cmd-green px-5 py-3 text-sm font-extrabold text-cmd-bg0 shadow-glow transition hover:brightness-105 active:scale-[0.99] disabled:cursor-not-allowed disabled:opacity-45 sm:text-base">
            Execute
          </button>
        </div>
      </form>
    </section>
  </main>

  <script>
    const wsProtocol = window.location.protocol === "https:" ? "wss:" : "ws:";
    const ws = new WebSocket(`${wsProtocol}//${window.location.host}/ws`);

    const messages = document.getElementById("messages");
    const inputEl = document.getElementById("input");
    const sendButtonEl = document.getElementById("sendButton");
    const promptChipsEl = document.getElementById("promptChips");
    const demoRegionEl = document.getElementById("demoRegion");
    const demoAppEl = document.getElementById("demoApp");
    const demoRepoEl = document.getElementById("demoRepo");
    const demoBranchEl = document.getElementById("demoBranch");
    const connectionBadgeEl = document.getElementById("connectionBadge");
    const connectionDotEl = document.getElementById("connectionDot");

    const deploymentCards = new Map();
    const deploymentTimers = new Map();

    let lastUserCommand = "";
    let isAwaitingResponse = false;
    let pendingCommandCard = null;
    let pendingCommandTimer = null;

    const statusOrder = ["queued", "building", "pushing", "starting", "success"];
    const statusProgress = { queued: 10, building: 45, pushing: 70, starting: 90, success: 100 };

    const demoPromptActions = [
      { label: "List apps", build: (v) => `list apps on ${v.region}` },
      { label: "Show app", build: (v) => `show app ${v.app} on ${v.region}` },
      { label: "Show logs", build: (v) => `show logs for ${v.app} on ${v.region}` },
      { label: "List deployments", build: (v) => `list deployments for ${v.app} on ${v.region}` },
      { label: "Delete app", build: (v) => `delete app ${v.app} on ${v.region}` },
      { label: "Create & deploy", build: (v) => `create and deploy ${v.app} to ${v.region} with ${v.repo} on branch ${v.branch}` },
    ];
    const debugMode = new URLSearchParams(window.location.search).get("debug") === "1";

    function safeDemoValue(raw, fallback, maxLen) {
      const value = String(raw || "").trim() || fallback;
      return value.slice(0, maxLen);
    }

    function getDemoVars() {
      return {
        region: safeDemoValue(demoRegionEl?.value, "osc-fr1", 24),
        app: safeDemoValue(demoAppEl?.value, "samirtest4", 40),
        repo: safeDemoValue(demoRepoEl?.value, "https://github.com/Scalingo/sample-go-gin", 180),
        branch: safeDemoValue(demoBranchEl?.value, "master", 60)
      };
    }

    function bootPromptChips() {
      promptChipsEl.innerHTML = "";
      const vars = getDemoVars();
      for (const action of demoPromptActions) {
        const prompt = action.build(vars);
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "rounded-full border border-cmd-line bg-cmd-bg2/65 px-3 py-1 text-xs text-cmd-text transition hover:border-cmd-amber/60 hover:text-cmd-amber";
        btn.textContent = action.label;
        btn.title = prompt;
        btn.addEventListener("click", () => {
          inputEl.value = action.build(getDemoVars());
          inputEl.focus();
        });
        promptChipsEl.appendChild(btn);
      }
    }

    function setConnectionState(state) {
      if (state === "connected") {
        connectionBadgeEl.className = "inline-flex items-center gap-2 rounded-full border border-cmd-green/30 bg-cmd-green/10 px-3 py-1 text-xs font-bold text-cmd-green";
        connectionDotEl.className = "h-2 w-2 rounded-full bg-cmd-green motion-safe:animate-pulseSignal";
        connectionBadgeEl.lastChild.textContent = "Connected";
        return;
      }
      if (state === "connecting") {
        connectionBadgeEl.className = "inline-flex items-center gap-2 rounded-full border border-cmd-amber/40 bg-cmd-amber/12 px-3 py-1 text-xs font-bold text-cmd-amber";
        connectionDotEl.className = "h-2 w-2 rounded-full bg-cmd-amber motion-safe:animate-pulseSignal";
        connectionBadgeEl.lastChild.textContent = "Connecting";
        return;
      }
      connectionBadgeEl.className = "inline-flex items-center gap-2 rounded-full border border-cmd-red/40 bg-cmd-red/12 px-3 py-1 text-xs font-bold text-cmd-red";
      connectionDotEl.className = "h-2 w-2 rounded-full bg-cmd-red";
      connectionBadgeEl.lastChild.textContent = "Offline";
    }

    function setComposerLocked(locked) {
      isAwaitingResponse = locked;
      inputEl.disabled = locked;
      sendButtonEl.disabled = locked;
      inputEl.placeholder = locked ? "Execution en cours..." : "Ex: list apps on osc-fr1";
    }

    function escapeHtml(value) {
      return (value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function escapeAttr(value) {
      return escapeHtml(String(value || ""));
    }

    function parseWsEnvelope(text) {
      try {
        const parsed = JSON.parse(text);
        if (!parsed || typeof parsed !== "object") return null;
        if (!parsed.version || !parsed.event_type || !parsed.status) return null;
        return parsed;
      } catch (e) {
        return null;
      }
    }

    function eventToneClasses(eventType, status) {
      if ((eventType || "").startsWith("deployments.")) return "border-cmd-amber/55";
      if ((eventType || "").startsWith("apps.")) return "border-cmd-green/45";
      if ((eventType || "").includes("validation")) return "border-cmd-amber/55";
      if (status === "requires_confirmation") return "border-cmd-red/55";
      if (status === "error") return "border-cmd-red/55";
      return "border-cmd-line";
    }

    function statusBadgeClasses(status) {
      if (status === "success") return "border-cmd-green/40 bg-cmd-green/12 text-cmd-green";
      if (status === "warning") return "border-cmd-amber/50 bg-cmd-amber/15 text-cmd-amber";
      if (status === "error") return "border-cmd-red/45 bg-cmd-red/15 text-cmd-red";
      if (status === "requires_confirmation") return "border-cmd-red/45 bg-cmd-red/15 text-cmd-red";
      return "border-cmd-line bg-cmd-bg2/40 text-cmd-mute";
    }

    function formatEventLabel(eventType) {
      return (eventType || "system.message").replaceAll(".", " · ");
    }

    function cleanHumanMessage(envelope, rawText) {
      const source = String(envelope?.human_message || rawText || "").trim();
      if (!source) return "";

      // Keep the first locale segment for concise demo output when backend sends bilingual text.
      let cleaned = source.includes(" / ") ? source.split(" / ")[0].trim() : source;

      // Hide noisy preview payload details in the main sentence.
      cleaned = cleaned.replace(/^Action preview:[\s\S]*?\.\s*/i, "");

      if (!cleaned) {
        if (envelope?.status === "success") return "Operation terminee avec succes.";
        if (envelope?.status === "warning") return "Operation terminee avec attention requise.";
        if (envelope?.status === "error") return "Une erreur est survenue pendant l'operation.";
      }

      return cleaned || source;
    }

    function normalizeProgress(data) {
      if (typeof data.progress === "number") return data.progress;
      if (statusProgress[data.status] !== undefined) return statusProgress[data.status];
      return 0;
    }

    function mapSummaryFields(payload) {
      if (!payload || typeof payload !== "object") return [];
      const summary = [];
      const app = payload.app || {};
      const deployment = payload.deployment || {};

      if (app.name) summary.push({ k: "App", v: app.name });
      if (app.region) summary.push({ k: "Region", v: app.region });
      if (app.status) summary.push({ k: "App Status", v: app.status });
      if (deployment.id) summary.push({ k: "Deployment", v: deployment.id });
      if (deployment.status) summary.push({ k: "Deploy Status", v: deployment.status });
      if (deployment.git_ref) summary.push({ k: "Git Ref", v: deployment.git_ref });

      if (!summary.length) {
        for (const [k, v] of Object.entries(payload).slice(0, 5)) {
          if (v === null || v === undefined) continue;
          if (typeof v === "string" || typeof v === "number" || typeof v === "boolean") summary.push({ k, v: String(v) });
        }
      }
      return summary.slice(0, 6);
    }

    function renderAppList(payload) {
      const apps = Array.isArray(payload?.apps) ? payload.apps : [];
      if (!apps.length) return "<p class=\"text-sm text-cmd-mute\">Aucune app detectee.</p>";
      return `
        <div class="space-y-2">
          <p class="text-xs uppercase tracking-[0.12em] text-cmd-mute">${apps.length} application(s)</p>
          <div class="grid gap-2 sm:grid-cols-2">${apps.map((app) => `
            <div class="rounded-xl border border-cmd-line bg-cmd-bg2/55 p-3">
              <p class="text-sm font-bold text-cmd-text">${escapeHtml(app.name || "unknown")}</p>
              <p class="mt-1 text-xs text-cmd-mute">${escapeHtml(app.region || "n/a")} · ${escapeHtml(app.status || "unknown")}</p>
              ${app.url ? `<p class="mt-2 text-xs text-cmd-amber break-all">${escapeHtml(app.url)}</p>` : ""}
            </div>
          `).join("")}</div>
        </div>
      `;
    }

    function renderAppDetails(payload) {
      const app = payload?.app;
      if (!app || typeof app !== "object") return "";
      const fields = [
        ["Name", app.name],
        ["Region", app.region],
        ["Status", app.status],
        ["URL", app.url],
        ["Stack", app.stack]
      ].filter((item) => item[1]);
      return `
        <div class="rounded-xl border border-cmd-line bg-cmd-bg2/55 p-3">
          <p class="text-xs uppercase tracking-[0.12em] text-cmd-mute">Application Overview</p>
          <div class="mt-2 grid gap-2 sm:grid-cols-2">${fields.map(([k, v]) => `
            <div>
              <p class="text-[10px] uppercase tracking-wide text-cmd-mute">${escapeHtml(k)}</p>
              <p class="text-xs text-cmd-text break-all">${escapeHtml(String(v))}</p>
            </div>
          `).join("")}</div>
        </div>
      `;
    }

    function renderDeployments(payload) {
      const deployments = Array.isArray(payload?.deployments) ? payload.deployments : [];
      const deployment = payload?.deployment;
      if (!deployments.length && (!deployment || typeof deployment !== "object")) return "";

      if (deployments.length) {
        return `
          <div class="space-y-2">
            <p class="text-xs uppercase tracking-[0.12em] text-cmd-mute">Recent Deployments</p>
            <div class="space-y-2">${deployments.slice(0, 5).map((dep) => `
              <div class="rounded-xl border border-cmd-line bg-cmd-bg2/55 p-3">
                <p class="text-sm font-bold text-cmd-text">${escapeHtml(dep.id || "deployment")}</p>
                <p class="mt-1 text-xs text-cmd-mute">${escapeHtml(dep.status || "unknown")} · ${escapeHtml(dep.git_ref || "no-ref")}</p>
                ${dep.created_at ? `<p class="mt-1 text-[11px] text-cmd-mute">${escapeHtml(dep.created_at)}</p>` : ""}
              </div>
            `).join("")}</div>
          </div>
        `;
      }

      return `
        <div class="rounded-xl border border-cmd-line bg-cmd-bg2/55 p-3">
          <p class="text-xs uppercase tracking-[0.12em] text-cmd-mute">Deployment Overview</p>
          <p class="mt-1 text-sm font-bold text-cmd-text">${escapeHtml(deployment.id || "deployment")}</p>
          <p class="mt-1 text-xs text-cmd-mute">${escapeHtml(deployment.status || "unknown")} · ${escapeHtml(deployment.git_ref || "no-ref")}</p>
        </div>
      `;
    }

    function renderLogsPanel(envelope, fallbackText) {
      const payload = envelope?.structured_payload || {};
      const chunks = [];
      if (typeof payload.logs === "string" && payload.logs.trim()) chunks.push(payload.logs.trim());
      if (Array.isArray(payload.log_lines) && payload.log_lines.length) chunks.push(payload.log_lines.join("\n"));
      if (typeof envelope?.human_message === "string" && envelope.human_message.includes("\n")) chunks.push(envelope.human_message);
      if (!chunks.length && fallbackText) chunks.push(fallbackText);
      const output = chunks.join("\n\n").trim();
      if (!output) return "";

      return `
        <div class="rounded-xl border border-cmd-line bg-[#0d0b08] p-3">
          <p class="mb-2 text-xs uppercase tracking-[0.12em] text-cmd-mute">Terminal Output</p>
          <pre class="max-h-64 overflow-auto whitespace-pre-wrap font-mono text-xs text-cmd-green">${escapeHtml(output)}</pre>
        </div>
      `;
    }

    function renderValidationCard(envelope) {
      const missing = Array.isArray(envelope?.structured_payload?.missing_entities) ? envelope.structured_payload.missing_entities : [];
      if (!missing.length) return "";
      return `
        <div class="rounded-xl border border-cmd-amber/45 bg-cmd-amber/10 p-3">
          <p class="text-xs font-bold uppercase tracking-[0.12em] text-cmd-amber">Missing Fields</p>
          <div class="mt-2 flex flex-wrap gap-2">
            ${missing.map((m) => `<span class="rounded-full border border-cmd-amber/45 px-2 py-1 text-xs text-cmd-amber">${escapeHtml(m)}</span>`).join("")}
          </div>
        </div>
      `;
    }

    function renderConfirmationCard(envelope) {
      if (envelope?.status !== "requires_confirmation") return "";
      const token = envelope?.structured_payload?.confirm_token;
      if (!token) return "";
      const command = `confirm ${token}`;
      return `
        <div class="rounded-xl border border-cmd-red/55 bg-cmd-red/10 p-3">
          <p class="text-xs font-bold uppercase tracking-[0.12em] text-cmd-red">Confirmation Required</p>
          <p class="mt-1 text-sm text-cmd-text">Action destructive detectee. Execute la commande suivante pour confirmer :</p>
          <code class="mt-2 inline-block rounded border border-cmd-red/50 bg-[#281512] px-2 py-1 font-mono text-xs text-cmd-red">${escapeHtml(command)}</code>
          <button type="button" data-action-cmd="${escapeAttr(command)}" class="ml-2 rounded-lg border border-cmd-red/45 bg-cmd-red/15 px-2 py-1 text-xs font-semibold text-cmd-red hover:bg-cmd-red/25">Confirm now</button>
        </div>
      `;
    }

    function renderSummaryGrid(envelope) {
      const payload = envelope?.structured_payload || {};
      const summary = mapSummaryFields(payload);
      if (!summary.length) return "";
      return `
        <div class="grid gap-2 sm:grid-cols-2">${summary.map((item) => `
          <div class="rounded-xl border border-cmd-line bg-cmd-bg2/55 px-3 py-2">
            <p class="text-[10px] uppercase tracking-wide text-cmd-mute">${escapeHtml(item.k)}</p>
            <p class="mt-0.5 text-xs text-cmd-text break-all">${escapeHtml(item.v)}</p>
          </div>
        `).join("")}</div>
      `;
    }

    function renderActions(envelope) {
      const actions = Array.isArray(envelope?.next_actions) ? envelope.next_actions.filter(Boolean) : [];
      if (!actions.length) return "";
      return `
        <div>
          <p class="mb-2 text-[10px] uppercase tracking-[0.12em] text-cmd-mute">Next Actions</p>
          <div class="flex flex-wrap gap-2">${actions.map((a) => `
            <button type="button" data-action-cmd="${escapeAttr(a)}" class="rounded-full border border-cmd-green/35 bg-cmd-green/12 px-2 py-1 font-mono text-xs text-cmd-green hover:bg-cmd-green/20">${escapeHtml(a)}</button>
          `).join("")}</div>
        </div>
      `;
    }

    function sendQuickCommand(command) {
      const text = String(command || "").trim();
      if (!text || isAwaitingResponse) return;
      appendUserMessage(text);
      lastUserCommand = text;
      createPendingCommandCard(lastUserCommand);
      setComposerLocked(true);
      ws.send(text);
    }

    function createDebugDetails(envelope, rawText) {
      if (!debugMode) return "";
      const payloadText = envelope ? JSON.stringify(envelope.structured_payload || {}, null, 2) : rawText;
      return `
        <details class="rounded-xl border border-cmd-line bg-cmd-bg2/45 px-3 py-2">
          <summary class="cursor-pointer text-xs font-semibold text-cmd-mute">Debug JSON</summary>
          <pre class="mt-2 max-h-64 overflow-auto whitespace-pre-wrap font-mono text-xs text-cmd-mute">${escapeHtml(payloadText)}</pre>
        </details>
      `;
    }

    function clearPendingCommandCard(finalText) {
      if (!pendingCommandCard) return;
      if (pendingCommandTimer) {
        clearInterval(pendingCommandTimer);
        pendingCommandTimer = null;
      }
      const status = pendingCommandCard.querySelector('[data-role="pendingStatus"]');
      const walker = pendingCommandCard.querySelector('[data-role="pendingWalker"]');
      status.textContent = finalText || "Execution terminee.";
      walker.textContent = "OK";
      pendingCommandCard = null;
    }

    function createPendingCommandCard(command) {
      clearPendingCommandCard();
      const li = document.createElement("li");
      li.className = "motion-safe:animate-riseIn w-full max-w-[96%] rounded-2xl border border-cmd-amber/45 bg-cmd-bg2/65 p-4 shadow-panel sm:max-w-[86%]";
      li.innerHTML = `
        <div class="mb-2 flex items-center justify-between gap-2">
          <p class="text-sm font-bold text-cmd-amber">Commande en cours</p>
          <span class="rounded-full border border-cmd-amber/45 bg-cmd-amber/12 px-2 py-0.5 text-[10px] font-semibold uppercase tracking-wide text-cmd-amber">processing</span>
        </div>
        <p class="font-mono text-xs text-cmd-mute">${escapeHtml(command)}</p>
        <div class="mt-3 relative h-5 rounded-full border border-cmd-line bg-cmd-bg0/55">
          <div class="absolute left-0 right-0 top-1/2 h-px -translate-y-1/2 bg-cmd-line"></div>
          <span class="absolute left-[2%] top-1/2 -translate-y-1/2 text-sm transition-all duration-300" data-role="pendingWalker">o/</span>
        </div>
        <p class="mt-2 text-xs text-cmd-mute" data-role="pendingStatus">Traitement de la commande en cours...</p>
      `;
      messages.appendChild(li);
      messages.scrollTop = messages.scrollHeight;
      pendingCommandCard = li;

      let progress = 2;
      pendingCommandTimer = setInterval(() => {
        if (!pendingCommandCard) return;
        progress = Math.min(progress + 8, 92);
        pendingCommandCard.querySelector('[data-role="pendingWalker"]').style.left = `calc(${progress}% - 10px)`;
      }, 320);
    }

    function appendBotCard(rawText) {
      const envelope = parseWsEnvelope(rawText);
      const textForDisplay = cleanHumanMessage(envelope, rawText);
      const eventType = envelope?.event_type || "system.message";
      const status = envelope?.status || "success";
      const riskLevel = envelope?.risk_level || "none";
      const toneClass = eventToneClasses(eventType, status);

      const li = document.createElement("li");
      li.className = `motion-safe:animate-riseIn w-full max-w-[96%] rounded-2xl border bg-cmd-bg1/90 p-4 shadow-panel sm:max-w-[86%] ${toneClass}`;

      const commandSummary = `
        <div class="flex flex-wrap items-center gap-2">
          <span class="rounded-full border border-cmd-line bg-cmd-bg2/55 px-2 py-0.5 text-[10px] uppercase tracking-wide text-cmd-mute">${escapeHtml(formatEventLabel(eventType))}</span>
          <span class="rounded-full border px-2 py-0.5 text-[10px] font-bold uppercase tracking-wide ${statusBadgeClasses(status)}">${escapeHtml(status)}</span>
          <span class="rounded-full border border-cmd-line bg-cmd-bg2/55 px-2 py-0.5 text-[10px] uppercase tracking-wide text-cmd-mute">risk: ${escapeHtml(riskLevel)}</span>
        </div>
      `;

      const payload = envelope?.structured_payload || {};
      const showAppList = eventType === "apps.list";
      const showAppDetails = eventType === "apps.get" || eventType.startsWith("apps.");
      const showDeployments = eventType.startsWith("deployments.");
      const showValidation = eventType === "command.validation_error";
      const showLogs = eventType === "deployments.output" || eventType.includes("log") || rawText.toLowerCase().includes("log");

      li.innerHTML = `
        <div class="space-y-3">
          <div class="flex items-start gap-3">
            <div class="mt-0.5 flex h-8 w-8 shrink-0 items-center justify-center rounded-full border border-cmd-line bg-cmd-bg2 text-xs font-black text-cmd-amber">AI</div>
            <div class="min-w-0 flex-1 space-y-3">
              <div>
                <p class="text-sm font-bold text-cmd-text">Ops Assistant</p>
                ${commandSummary}
              </div>
              <p class="rounded-xl border border-cmd-line bg-cmd-bg2/55 px-3 py-2 text-sm text-cmd-text whitespace-pre-wrap">${escapeHtml(textForDisplay)}</p>
              ${renderConfirmationCard(envelope)}
              ${showValidation ? renderValidationCard(envelope) : ""}
              ${showAppList ? renderAppList(payload) : ""}
              ${showAppDetails ? renderAppDetails(payload) : ""}
              ${showDeployments ? renderDeployments(payload) : ""}
              ${showLogs ? renderLogsPanel(envelope, rawText) : ""}
              ${renderSummaryGrid(envelope)}
              ${renderActions(envelope)}
              ${createDebugDetails(envelope, rawText)}
            </div>
          </div>
        </div>
      `;

      li.querySelectorAll("[data-action-cmd]").forEach((btn) => {
        btn.addEventListener("click", () => {
          const cmd = btn.getAttribute("data-action-cmd") || "";
          sendQuickCommand(cmd);
        });
      });

      messages.appendChild(li);
      messages.scrollTop = messages.scrollHeight;
    }

    function appendUserMessage(text) {
      const li = document.createElement("li");
      li.className = "motion-safe:animate-riseIn ml-auto max-w-[92%] rounded-2xl border border-cmd-amber/40 bg-gradient-to-br from-[#f2b96c] to-[#e1a85e] px-4 py-3 text-sm font-semibold leading-relaxed text-cmd-bg0 shadow-panel sm:max-w-[80%] sm:text-[15px]";
      li.textContent = text;
      messages.appendChild(li);
      messages.scrollTop = messages.scrollHeight;
    }

    function appendSystemWelcome() {
      const li = document.createElement("li");
      li.className = "motion-safe:animate-riseIn w-full max-w-[96%] rounded-2xl border border-cmd-line bg-cmd-bg2/50 p-4 shadow-panel sm:max-w-[86%]";
      li.innerHTML = `
        <p class="text-sm font-bold text-cmd-amber">Mission Ready</p>
        <p class="mt-1 text-sm text-cmd-text">Console prete. Lance une commande pour afficher un rendu demo-friendly avec resume, signaux, et actions suivantes.</p>
      `;
      messages.appendChild(li);
      messages.scrollTop = messages.scrollHeight;
    }

    function createDeploymentCard(data) {
      const id = data.deployment_id;
      if (deploymentCards.has(id)) return deploymentCards.get(id);

      const li = document.createElement("li");
      li.className = "motion-safe:animate-riseIn w-full max-w-[96%] rounded-2xl border border-cmd-amber/45 bg-cmd-bg2/65 p-4 shadow-panel sm:max-w-[86%]";
      li.dataset.deploymentId = id;

      const appName = data.app_name || id;
      li.innerHTML = `
        <div class="mb-2 flex items-center justify-between gap-3 text-sm">
          <div class="font-bold tracking-wide text-cmd-amber">Deployment ${escapeHtml(appName)}</div>
          <div class="font-mono text-xs text-cmd-mute" data-role="elapsed">00:00</div>
        </div>
        <div class="mb-3 h-2.5 overflow-hidden rounded-full bg-cmd-bg0/55">
          <div class="h-full w-0 bg-gradient-to-r from-cmd-amber to-cmd-green transition-all duration-300" data-role="bar"></div>
        </div>
        <div class="mb-3 relative h-5 rounded-full border border-cmd-line bg-cmd-bg0/65">
          <div class="absolute left-0 right-0 top-1/2 h-px -translate-y-1/2 bg-cmd-line"></div>
          <span class="absolute top-1/2 -translate-y-1/2 text-sm transition-all duration-300" data-role="walker">o/</span>
        </div>
        <div class="mb-2 grid grid-cols-5 gap-1.5 text-[10px] text-cmd-mute sm:text-[11px]">
          <div class="step rounded-full bg-cmd-bg0/65 px-1 py-1 text-center" data-step="queued">Queued</div>
          <div class="step rounded-full bg-cmd-bg0/65 px-1 py-1 text-center" data-step="building">Build</div>
          <div class="step rounded-full bg-cmd-bg0/65 px-1 py-1 text-center" data-step="pushing">Push</div>
          <div class="step rounded-full bg-cmd-bg0/65 px-1 py-1 text-center" data-step="starting">Start</div>
          <div class="step rounded-full bg-cmd-bg0/65 px-1 py-1 text-center" data-step="success">Done</div>
        </div>
        <div class="flex items-center justify-between gap-2 text-xs sm:text-sm">
          <div class="min-w-0 flex items-center gap-2">
            <span class="inline-block h-3.5 w-3.5 animate-spin rounded-full border-2 border-cmd-mute/35 border-t-cmd-amber" data-role="spinner"></span>
            <span class="font-semibold text-cmd-amber" data-role="guy">running</span>
            <span class="max-w-[200px] truncate text-cmd-text sm:max-w-[420px]" data-role="statusText">Deployment started...</span>
          </div>
          <div class="text-cmd-mute" data-role="progressText">0%</div>
        </div>
      `;

      messages.appendChild(li);
      messages.scrollTop = messages.scrollHeight;
      deploymentCards.set(id, li);

      const startedAt = Date.now();
      const timer = setInterval(() => {
        const elapsed = Math.floor((Date.now() - startedAt) / 1000);
        const mm = String(Math.floor(elapsed / 60)).padStart(2, "0");
        const ss = String(elapsed % 60).padStart(2, "0");
        li.querySelector('[data-role="elapsed"]').textContent = `${mm}:${ss}`;
      }, 1000);
      deploymentTimers.set(id, timer);
      return li;
    }

    function markSteps(card, status, final, isError) {
      const steps = card.querySelectorAll(".step");
      const idx = statusOrder.indexOf(status);
      steps.forEach((stepEl) => {
        const step = stepEl.dataset.step;
        const stepIdx = statusOrder.indexOf(step);
        stepEl.className = "step rounded-full bg-cmd-bg0/65 px-1 py-1 text-center";

        if (idx >= 0 && stepIdx < idx) stepEl.classList.add("bg-cmd-green/80", "font-bold", "text-cmd-bg0");
        if (!final && step === status) stepEl.classList.add("bg-cmd-amber/70", "font-bold", "text-cmd-bg0");
        if (final && !isError && step === "success") stepEl.classList.add("bg-cmd-green", "font-bold", "text-cmd-bg0");
        if (final && isError && stepIdx <= Math.max(idx, 3)) stepEl.classList.add("bg-cmd-red/70", "font-bold", "text-cmd-bg0");
      });
    }

    function finalizeCard(id, card, text, progress, isError) {
      card.querySelector('[data-role="bar"]').style.width = `${progress}%`;
      card.querySelector('[data-role="progressText"]').textContent = `${progress}%`;
      card.querySelector('[data-role="statusText"]').textContent = text;
      card.querySelector('[data-role="spinner"]').classList.add("hidden");
      card.querySelector('[data-role="guy"]').textContent = isError ? "blocked" : "done";
      const timer = deploymentTimers.get(id);
      if (timer) {
        clearInterval(timer);
        deploymentTimers.delete(id);
      }
    }

    function handleDeploymentEvent(data) {
      const id = data.deployment_id;
      const card = createDeploymentCard(data);
      const isError = Boolean(data.error_kind) || (data.final && data.status !== "success");
      const text = data.phase_label || data.message || data.status || "In progress";
      const progress = normalizeProgress(data);
      const final = Boolean(data.final) || data.type === "deployment_finished";

      card.querySelector('[data-role="bar"]').style.width = `${progress}%`;
      card.querySelector('[data-role="progressText"]').textContent = `${progress}%`;
      card.querySelector('[data-role="statusText"]').textContent = text;
      card.querySelector('[data-role="walker"]').style.left = `calc(${Math.max(2, Math.min(96, progress))}% - 10px)`;
      markSteps(card, data.status, final, isError);

      if (final) {
        finalizeCard(id, card, text, progress, isError);
        appendBotCard(isError ? `[ERROR] Deployment failed for ${data.app_name || id}.` : `[OK] Deployment successful for ${data.app_name || id}.`);
      } else if (data.type === "deployment_started") {
        appendBotCard(`Deployment launched for ${data.app_name || id}.`);
      }
    }

    function sendMessage(event) {
      event.preventDefault();
      if (isAwaitingResponse) return;
      if (!inputEl.value) return;

      const cmd = inputEl.value.trim();
      if (!cmd) return;
      sendQuickCommand(cmd);
      inputEl.value = "";
    }

    ws.onopen = function() {
      setConnectionState("connected");
      appendSystemWelcome();
    };

    ws.onclose = function() {
      setConnectionState("closed");
      setComposerLocked(true);
    };

    ws.onerror = function() {
      setConnectionState("closed");
      appendBotCard("Connection error with websocket endpoint.");
    };

    ws.onmessage = function(event) {
      setConnectionState("connected");
      setComposerLocked(false);
      clearPendingCommandCard("Reponse recue.");

      let data = null;
      try {
        data = JSON.parse(event.data);
      } catch (err) {
        data = null;
      }

      if (data && data.type && data.deployment_id) {
        handleDeploymentEvent(data);
        return;
      }

      appendBotCard(event.data);
    };

    setConnectionState("connecting");
    bootPromptChips();
    [demoRegionEl, demoAppEl, demoRepoEl, demoBranchEl].forEach((el) => {
      if (!el) return;
      el.addEventListener("input", bootPromptChips);
    });
  </script>
</body>
</html>
