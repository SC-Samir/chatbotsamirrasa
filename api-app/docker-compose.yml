services:
  redis:
    image: redis:7-alpine
    container_name: scalingoops-redis
    ports:
      - "6379:6379"

  rasa-train:
    build:
      context: .
      dockerfile: Dockerfile.rasa-train
    container_name: scalingoops-rasa-train
    profiles: ["train"]
    volumes:
      - ./models:/app/models

  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    container_name: scalingoops-app
    depends_on:
      - redis
    environment:
      SCALINGO_API_TOKEN: ${SCALINGO_API_TOKEN:-}
      REDIS_URL: redis://redis:6379/0
      RASA_MODEL_PATH: models/model.tar.gz
      DEBUG: ${DEBUG:-false}
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
    command: ["uv", "run", "--no-project", "gunicorn", "app.main:app", "-w", "4", "-k", "uvicorn.workers.UvicornWorker", "--bind", "0.0.0.0:8000"]

  worker:
    build:
      context: .
      dockerfile: Dockerfile.app
    container_name: scalingoops-worker
    depends_on:
      - redis
    environment:
      SCALINGO_API_TOKEN: ${SCALINGO_API_TOKEN:-}
      REDIS_URL: redis://redis:6379/0
      RASA_MODEL_PATH: models/model.tar.gz
      DEBUG: ${DEBUG:-false}
    volumes:
      - ./models:/app/models
    command: ["uv", "run", "--no-project", "celery", "-A", "app.tasks.celery_app", "worker", "--loglevel=info"]
